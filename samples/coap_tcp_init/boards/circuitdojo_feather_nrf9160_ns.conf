# Align the max FD entry to NRF_MODEM_MAX_SOCKET_COUNT(8) -- see https_init's
# board conf, same reasoning applies to any modem-offloaded socket use.
CONFIG_ZVFS_OPEN_MAX=8
CONFIG_NET_SOCKETS_POLL_MAX=8

# Disable Duplicate Address Detection (DAD)
# due to not being properly implemented for offloaded interfaces.
CONFIG_NET_IPV6_NBR_CACHE=n
CONFIG_NET_IPV6_MLD=n

# Connection Manager and Connectivity layer
CONFIG_NRF_MODEM_LIB_NET_IF=y

# AT Host
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_AT_HOST_LIBRARY=y

# NOTE: pigeon_coap.c's pigeon_coap_register_psk() (see ~/pigeon) always
# calls tls_credential_add() to register the PSK identity/secret, with no
# CONFIG_MODEM_KEY_MGMT branch. nRF91 TLS sockets are offloaded to the modem
# regardless of this setting (see https_init's connection_manager.c comment
# on CONFIG_MODEM_KEY_MGMT), so tls_credential_add() never reaches the
# modem's real credential store here -- real-hardware PSK auth for this
# sample will not work until pigeon_coap.c gains a modem_key_mgmt_write()
# path for boards like this one. Known pigeon-library gap, not a bug in this
# sample; it builds and links fine regardless (dovecote has no CoAP listener
# to test against yet anyway).

# TF-M configurations
CONFIG_BUILD_WITH_TFM=y
CONFIG_TFM_PROFILE_TYPE_NOT_SET=y
CONFIG_TFM_CMAKE_BUILD_TYPE_RELEASE=y

# UART configuration (common)
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y

# UART configuration (nRF91 specific)
CONFIG_UART_1_ASYNC=y
CONFIG_UART_1_INTERRUPT_DRIVEN=n
