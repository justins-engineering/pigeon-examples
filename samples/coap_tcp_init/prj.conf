# NOTE: CONFIG_PIGEON is intentionally left disabled here. Enabling it makes
# Kconfig's PIGEON_CONNECTOR_TYPE choice pick a default connector, which then
# requires src/pigeon_coap.c or src/pigeon_https.c — neither exists yet (see
# pigeon's CLAUDE.md: early scaffold, transports added when implemented).
# Once enabled, also set:
# CONFIG_PIGEON_ENDPOINT="coaps+tcp://api.pidgeiot.com/device/pigeons/demo-pigeon-0002"
# CONFIG_PIGEON_TOKEN="replace-with-device-jwt"
#
# coaps+tcp:// (RFC 8323 CoAP-over-TLS/TCP), not coaps:// (UDP/DTLS): this
# device stack has no UDP support yet. The real dovecote backend only serves
# coaps:// today — see pigeon's CLAUDE.md "Known wire-compat gap" note.

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y

# Stack and heap configurations
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=8192

# Generic networking options
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=y
