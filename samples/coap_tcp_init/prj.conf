# Pigeon client library: fetches/reports the device shadow over CoAP-over-
# TLS/TCP (pigeon_coap.c). CONFIG_PIGEON_ENDPOINT/TOKEN are real device
# secrets, so they live in the git-ignored prj.local.conf instead (auto-merged
# by CMakeLists.txt if present), e.g.:
# CONFIG_PIGEON_ENDPOINT="coaps+tcp://api.pidgeiot.com/device/pigeons/demo-pigeon-0002"
# CONFIG_PIGEON_TOKEN="replace-with-device-jwt"
#
# coaps+tcp:// (RFC 8323 CoAP-over-TLS/TCP), not coaps:// (UDP/DTLS): this
# device stack has no UDP support yet. The real dovecote backend only serves
# coaps:// today, and has no CoAP listener at all yet — see pigeon's
# CLAUDE.md "Known wire-compat gap" note. This sample builds and runs its
# client-side logic regardless; shadow_sync() failing against the real
# backend is expected, not a bug here.
CONFIG_PIGEON=y
CONFIG_PIGEON_CONNECTOR_COAP=y

# NCS boot banner
CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="Pigeon"

# Set LIBC
CONFIG_PICOLIBC=y

# PicolibC targets C17 and POSIX 2018 standards
CONFIG_STD_C17=y

# Enforce MISRA C standards
CONFIG_MISRA_SANE=y

# Enable FPU & FPU sharing
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Reset Reason and Reboot (shadow.c's "reboot" shadow command uses sys_reboot())
CONFIG_HWINFO=y
CONFIG_REBOOT=y

# Power Management
CONFIG_PM_DEVICE=y

# Compiler optimizations: this sample has no MCUboot/sysbuild partition
# rebalance (unlike https_init), so it lands in the SoC's default, small
# non-MCUboot nonsecure flash partition -- optimize for size, not debug.
CONFIG_SIZE_OPTIMIZATIONS=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y

# Lets shadow.c's "log" field actually toggle logging at runtime via
# log_filter_set() -- see https_init's shadow.c note.
CONFIG_LOG_RUNTIME_FILTERING=y

# Network Logging
CONFIG_NET_LOG=y
CONFIG_NET_SOCKETS_LOG_LEVEL_DBG=y

# Debugging
CONFIG_DEBUG=y
CONFIG_FAULT_DUMP=2

# Stack and heap configurations
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Generic networking options
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=y

# TLS credential storage: pigeon_coap.c's pigeon_coap_register_psk() calls
# tls_credential_add() to register the PSK identity/secret from pigeon_init()'s
# config under CONFIG_PIGEON_COAP_SEC_TAG (default 1).
CONFIG_TLS_CREDENTIALS=y

# Net connection manager
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=1024

# Default (768-800B) overflowed running connection_manager.c's net_mgmt event
# callback on this thread's stack -- see https_init's prj.conf note (same
# TLS/logging-heavy callback chain).
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048

# Without this, connection_manager.c's lte_disconnect() calling
# conn_mgr_all_if_down() fully shuts down the modem library instead of just
# deactivating LTE, leaving lte_lc_power_off()'s subsequent CFUN=0 with no AT
# channel to succeed on (task #6, root-caused and hardware-verified against
# https_init -- see that sample's prj.conf for the full writeup; this sample
# shares the same connection_manager.c pattern).
CONFIG_NRF_MODEM_LIB_NET_IF_DOWN_DEFAULT_LTE_DISCONNECT=y
