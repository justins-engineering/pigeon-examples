manifest:
  remotes:
    - name: ncs
      url-base: https://github.com/nrfconnect

  projects:
    - name: nrf
      repo-path: sdk-nrf
      remote: ncs
      revision: v3.4.0
      import:
         name-allowlist:
          - cjson
          - cmsis
          - cmsis-dsp
          - cmsis-nn
          - cmsis_6
          - hal_nordic
          - libmodem
          - littlefs
          - mbedtls
          - mcuboot
          - nrf_hw_models
          - nrfxlib
          - oberon-psa-crypto
          - picolibc
          - qcbor
          - segger
          - tf-psa-crypto
          - tinycrypt
          - trusted-firmware-m
          - zcbor
          - zephyr

    - name: hal_espressif
      url: https://github.com/zephyrproject-rtos/hal_espressif
      # This SHA is copied from ../zephyr/west.yml's own hal_espressif entry
      # (the vendored sdk-zephyr fork pinned by nrf's v3.4.0, i.e. this
      # workspace's actual ncs-v3.4.0 zephyr tree) -- NOT the commit this
      # entry originally carried as a comment (684c9e8f32e4373a2109855...),
      # which doesn't exist in the upstream hal_espressif repo at all (`git
      # cat-file -t` on it fails after a full fetch). Re-derive this from
      # ../zephyr/west.yml if bumping the `nrf` project's revision above.
      revision: b7953b8019361d09e613f7011d2ccc41b984d087
      path: modules/hal/espressif
      west-commands: west/west-commands.yml

  # pigeon is intentionally not a west project: ./pigeon is a local symlink
  # (see ../pigeon_module.cmake, which adds it to ZEPHYR_EXTRA_MODULES by
  # physical path) to the primary pigeon dev checkout, so local edits there
  # are picked up immediately without a push/west-update round trip.

  self:
    path: samples
