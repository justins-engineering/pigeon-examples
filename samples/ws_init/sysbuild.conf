# esp32c6_devkitc/Kconfig.sysbuild defaults BOOTLOADER to MCUBOOT (Espressif
# boards override the generic BOOTLOADER_NONE default -- unlike the nRF9160
# boards where MCUboot is opt-in). That default turned out to be broken in
# this Zephyr/MCUboot/NCS snapshot for a non-Nordic SoC: this workspace's
# `nrf` project (sdk-nrf) pulls in nrf/CMakeLists.txt unconditionally for
# every sysbuild image, including the MCUboot child image, and
# nrfxlib/common.cmake hard-asserts "GCC_M_CPU must be set to find correct
# lib" trying to resolve a Nordic-only crypto lib path for an SoC (esp32c6)
# nrfxlib has never heard of -- nrf/cmake/device_support.cmake even prints
# "SoC esp32c6 is not supported by this release" right before the assert
# fires. This isn't a pigeon-library gap or something to work around: it's
# NCS's own build machinery assuming Nordic-only SoCs workspace-wide, not
# just for images that need Nordic crypto. Explicitly override back to no
# bootloader (this sample doesn't need one -- see README) rather than
# chase that assertion; a real MCUboot/FOTA port to ESP32-C6 would need to
# resolve this at the west.yml/workspace level (e.g. a NCS release that
# added esp32c6 support, or excluding `nrf`'s CMakeLists coupling from
# non-Nordic sysbuild images), not from this sample.
SB_CONFIG_BOOTLOADER_NONE=y
