# esp32c6_devkitc/Kconfig.sysbuild defaults BOOTLOADER to MCUBOOT (Espressif
# boards override the generic BOOTLOADER_NONE default -- unlike the nRF9160
# boards where MCUboot is opt-in). Historically (pre-task #8, under the NCS
# west.yml manifest) turning this on was outright broken for a non-Nordic
# SoC: the `nrf` project (sdk-nrf) pulled in nrf/CMakeLists.txt
# unconditionally for every sysbuild image, including the MCUboot child
# image, and nrfxlib/common.cmake hard-asserted trying to resolve a
# Nordic-only crypto lib path for an SoC (esp32c6) nrfxlib had never heard
# of. Building this sample against samples/west-vanilla.yml (task #8's new
# default, no `nrf` project at all) removes that specific assert -- but the
# override stays, for a more mundane reason: unlike https_init, this sample
# has no sysbuild/mcuboot/ child-image config or signing key wired up yet
# (no CONFIG_PIGEON_FOTA here either -- see this sample's prj.conf and
# README's "ESP32-C6-DevKitC-1 port" section), so there's nothing for
# SB_CONFIG_BOOTLOADER_MCUBOOT to actually build against. A real MCUboot/
# FOTA port to ESP32-C6 is now unblocked at the workspace level but still
# needs that plumbing added -- not something to do from this sample's
# sysbuild.conf.
SB_CONFIG_BOOTLOADER_NONE=y
