# Pigeon client library: fetches/reports the device shadow over HTTPS
# (pigeon_https.c) -- same transport/wire contract as https_init, but this
# sample brings its own network interface up over WiFi (ESP32-C6) instead of
# LTE (nRF9160), and boots with no bootloader at all (see sysbuild.conf --
# esp32c6_devkitc/esp32c6/hpcore's own board Kconfig defaults to requiring
# MCUboot, which this vanilla-Zephyr build (task #8; see samples/west-vanilla.yml)
# has no signing-key/MCUboot-image plumbing set up for yet, so it's
# explicitly overridden off here). No CONFIG_PIGEON_FOTA wiring or
# firmware-update shadow handling either, as a consequence -- see this
# repo's README ("ESP32-C6-DevKitC-1 port") for that and the rest of the
# documented gaps.
#
# This sample is plain HTTPS polling ONLY -- no CONFIG_PIGEON_WS. WiFi/mains-
# powered devices are still expected to default to the same poll-based
# HTTPS connector as any constrained/cellular device (see https_init,
# coap_tcp_init); the persistent WS push channel is an opt-in add-on for
# devices that specifically want it, demonstrated on its own in the sibling
# ws_init sample rather than folded into this one, so this sample stays a
# clean reference for "WiFi bring-up + the same HTTPS connector every other
# sample uses."
#
# CONFIG_PIGEON_ENDPOINT/CONFIG_PIGEON_TOKEN and
# CONFIG_WIFI_CREDENTIALS_STATIC_SSID/_PASSWORD are real device/network
# secrets, so they live in the git-ignored prj.local.conf instead
# (auto-merged by CMakeLists.txt if present), e.g.:
# CONFIG_PIGEON_ENDPOINT="https://api.pidgeiot.com/device/pigeons/demo-pigeon-0003"
# CONFIG_PIGEON_TOKEN="replace-with-device-bearer-token"
# CONFIG_WIFI_CREDENTIALS_STATIC_SSID="replace-with-ssid"
# CONFIG_WIFI_CREDENTIALS_STATIC_PASSWORD="replace-with-psk"
CONFIG_PIGEON=y
CONFIG_PIGEON_CONNECTOR_HTTPS=y

# Boot banner
CONFIG_BOOT_BANNER_STRING="Pigeon"

# Set LIBC
CONFIG_PICOLIBC=y

# PicolibC targets C17 and POSIX 2018 standards
CONFIG_STD_C17=y

# Enforce MISRA C standards
CONFIG_MISRA_SANE=y

# Reset Reason and Reboot (shadow.c's "reboot" shadow command uses
# sys_reboot()). No CONFIG_FPU/CONFIG_FPU_SHARING here unlike https_init's
# prj.conf -- ESP32-C6's RISC-V core has no hardware FPU.
CONFIG_HWINFO=y
CONFIG_REBOOT=y

# ESP32-C6 has ample flash (4/8MB modules vs. the nRF9160's tight internal
# flash) but WiFi/mbedTLS/wpa_supplicant already eat a lot of it -- optimize
# for size, not debug, same reasoning as coap_tcp_init's prj.conf.
CONFIG_SIZE_OPTIMIZATIONS=y


# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y

# Lets shadow.c's "log" field actually toggle logging at runtime via
# log_filter_set() -- see https_init's shadow.c note.
CONFIG_LOG_RUNTIME_FILTERING=y

# Network Logging
CONFIG_NET_LOG=y
CONFIG_NET_SOCKETS_LOG_LEVEL_DBG=y

# Debugging. No CONFIG_FAULT_DUMP here -- it depends on ARM (see
# zephyr/arch/arm/core/Kconfig), and ESP32-C6's core is RISC-V, so setting
# it was always a no-op on this board (dropped as an unsatisfiable-
# dependency Kconfig warning, fatal under samples/west-vanilla.yml's build
# -- task #8).
CONFIG_DEBUG=y

# Stack and heap configurations. Bumped well past https_init's 8192: ESP32's
# WIFI_ESP32 Kconfig (zephyr/drivers/wifi/esp32/Kconfig.esp32) already adds
# its own ~50KB heap pool contribution (HEAP_MEM_POOL_ADD_SIZE_ESP_WIFI) on
# top of whatever this sets. mbedTLS itself no longer draws from this pool at
# all once CONFIG_MBEDTLS_ENABLE_HEAP (below) wires up its own dedicated
# buffer -- this pool is purely for the WiFi driver's static RX buffers
# (~10 x 1.6KB = ~16KB, always resident from esp_wifi_init() --
# ESP32_WIFI_STATIC_RX_BUFFER_NUM, default 10,
# zephyr/drivers/wifi/esp32/Kconfig.esp32:90-97), its dynamic RX buffers (up
# to ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM x ~1.6KB, bursty -- see that option
# below), and Zephyr's own net_buf/net_pkt pools -- none of which this
# repo's tooling can directly measure (native_sim builds against NSOS
# instead of the real ESP32 WiFi driver, so there's no equivalent of the
# mbedTLS harness for this specific pool). Bumped as a reasoned hedge (not a
# measured number, unlike CONFIG_MBEDTLS_HEAP_SIZE below) against the
# real-hardware "esp32c6_wifi_adapter: memory allocation failed" reports
# ws_init hit, alongside capping the dynamic RX buffer ceiling below --
# ESP32-C6-DevKitC-1 has 512KB SRAM to spare. This sample carries the same
# value even though it has no WS socket contending for heap, since the value
# was never attributed to WS in the first place (see the comment it's
# copied from, ws_init/prj.conf).
CONFIG_HEAP_MEM_POOL_SIZE=49152
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Caps the WiFi driver's dynamic RX buffer pool (drawn from the general heap
# above, zephyr/drivers/wifi/esp32/Kconfig.esp32:104-120) at half its
# default ceiling (32 -> 16). This is a low-throughput control-plane device
# (occasional HTTPS polls, no persistent socket) with no need for 32
# concurrent in-flight received-but-not-yet-processed 802.11 frames (each
# up to ~1.6KB); halving the worst-case burst directly reduces general-heap
# pressure during exactly the condition ws_init's real-hardware failures
# correlated with (reconnect churn -- more WiFi management/DHCP traffic
# arriving while the heap is already under pressure from other
# allocations). Not independently measured (same native_sim limitation as
# the general pool bump above), but a reasoned, low-risk mitigation: still
# >= ESP32_WIFI_STATIC_RX_BUFFER_NUM (10, unchanged), matching that option's
# own documented recommendation to keep dynamic >= static.
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=16

# Generic networking options
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_IPV6=n
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y

# TLS credential storage: wifi_connection_manager.c's provision_cert() calls
# tls_credential_add() (there's no modem to offload to on ESP32, unlike
# nRF91 -- see that file's comment) to register the CA cert under
# CONFIG_PIGEON_HTTPS_SEC_TAG's default sec_tag (1, WIFI_SEC_TAG below).
CONFIG_TLS_CREDENTIALS=y

# Net connection manager -- same generic conn_mgr_all_if_*() calls as
# https_init/coap_tcp_init's connection_manager.c, but note (found via the
# first-ever hardware run, board joined nothing) that WIFI_ESP32 does NOT
# register a conn_mgr connectivity binding for these calls to dispatch to
# -- this vendored tree's only such binding choice is
# CONNECTIVITY_WIFI_MGMT_APPLICATION, unset here, so conn_mgr_all_if_connect()
# is a harmless no-op (see wifi_connection_manager.c's wifi_connect()) and
# the actual join is requested explicitly via NET_REQUEST_WIFI_CONNECT_STORED
# instead. CONFIG_NET_CONNECTION_MANAGER itself is still needed for
# conn_mgr_all_if_up()/the L4 connected/disconnected events wifi_connect()
# waits on.
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=2048

# Default (768-800B) overflowed running the other samples' net_mgmt event
# callback (cert provisioning via tls_credential_add, mbedTLS, logging) on
# this thread's stack -- see https_init's prj.conf note (same TLS/logging-
# heavy callback chain).
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048

# WiFi (ESP32-C6 station mode). CONFIG_WIFI=y pulls in WIFI_ESP32
# (zephyr/drivers/wifi/esp32/Kconfig.esp32), which auto-selects
# NET_L2_WIFI_MGMT/MBEDTLS/PSA_CRYPTO -- no separate wpa_supplicant module
# needed, hal_espressif's WiFi driver brings its own WPA2/WPA3 stack.
CONFIG_WIFI=y

# Static WiFi credentials (no shell/settings-based provisioning yet -- see
# README gap note): CONFIG_WIFI_CREDENTIALS_STATIC wires these into
# wifi_mgmt's add_static_network_config(), driven by the explicit
# NET_REQUEST_WIFI_CONNECT_STORED request wifi_connect() issues
# (wifi_connection_manager.c) -- NOT by conn_mgr_all_if_connect(), which is
# a no-op here (see CONFIG_NET_CONNECTION_MANAGER's comment above). Same
# static-Kconfig-string-rather-than-runtime-credential-store pattern as
# CONFIG_PIGEON_ENDPOINT/_TOKEN.
#
# Unlike CONFIG_PIGEON_ENDPOINT/_TOKEN, the SSID has a compile-time
# BUILD_ASSERT in wifi_mgmt.c requiring a non-empty string even before
# prj.local.conf's real value is merged in -- so this can't be left unset
# in tracked source the way pigeon's Kconfig strings are. "changeme" here
# is a placeholder that fails loudly (auth/AP-not-found, not a silent
# no-op) if prj.local.conf is ever missing; the real network's SSID/PSK
# belong only there, same as the pigeon token below.
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_STATIC=y
CONFIG_WIFI_CREDENTIALS_STATIC_TYPE_PSK=y
CONFIG_WIFI_CREDENTIALS_STATIC_SSID="changeme"
CONFIG_WIFI_CREDENTIALS_STATIC_PASSWORD="changeme"

# CONFIG_NET_SOCKETS_SOCKOPT_TLS (pigeon_https.c's HTTPS/TLS transport)
# needs the full mbedTLS SSL/TLS protocol stack (MBEDTLS_SSL_CLI_C etc, see
# zephyr/modules/mbedtls/configs/config-mbedtls.h), not just the crypto
# primitives WIFI_ESP32 already pulls in for its own WPA2/WPA3 handshake --
# those are two different mbedTLS feature sets. Without this, sockets_tls.c
# fails to build with "implicit declaration of function
# 'mbedtls_ssl_get_session'" (that function -- and the whole SSL protocol
# layer -- is compiled out unless a TLS version is explicitly selected).
# TLS 1.2 rather than 1.3: simpler cipher/handshake surface, and this is
# what https_init/coap_tcp_init exercise against the same dovecote backend.
CONFIG_MBEDTLS_SSL_PROTO_TLS1_2=y

# MBEDTLS_SSL_PROTO_TLS1_2 (above) selects MBEDTLS_MD_C (generic hash
# dispatch) but doesn't itself pick a concrete hash algorithm -- without
# one, tf-psa-crypto/core/tf_psa_crypto_check_config.h hard-errors
# ("MBEDTLS_MD_C defined, but no hash algorithm") and md.c's now-dead-code
# function bodies fail -Werror=unused-parameter on top of that. SHA-256 is
# what TLS 1.2's standard cipher suites (and the rest of this workspace,
# e.g. pigeon's CONFIG_PIGEON_FOTA sha256 check) already assume.
CONFIG_PSA_WANT_ALG_SHA_256=y

# Nothing above actually selects a TLS 1.2 key exchange method --
# mbedtls_check_config.h hard-errors on that too ("TLS protocol enabled
# but no key exchange methods defined"). ECDHE-RSA/ECDHE-ECDSA cover the
# common real-world CA-issued cert cases (dovecote's CA, GTS_Root_R4.crt
# below, chains through either); PSA_WANT_ALG_ECDH/ECDSA plus the P-256
# curve are what those two key-exchange methods actually execute under
# the PSA crypto API mbedTLS 4.x/tf-psa-crypto uses internally now (see
# tf-psa-crypto/core/tf_psa_crypto_check_config.h) -- listing
# MBEDTLS_KEY_EXCHANGE_* alone isn't enough on its own in this mbedTLS
# version. RSA sign/verify covers ECDHE-RSA's certificate side even
# though the key exchange itself is elliptic-curve.
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_RSA_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y
CONFIG_MBEDTLS_X509_CRT_PARSE_C=y
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ALG_RSA_PKCS1V15_SIGN=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_RSA_PUBLIC_KEY=y
# MBEDTLS_KEY_EXCHANGE_ECDHE_RSA_ENABLED (above) also depends on
# PSA_WANT_KEY_TYPE_RSA_KEY_PAIR_BASIC (zephyr/modules/mbedtls/
# Kconfig.psa.logic), which auto-derives true only if IMPORT/EXPORT/
# GENERATE is set on RSA_KEY_PAIR -- RSA_PUBLIC_KEY alone doesn't satisfy
# it, even though this client only ever verifies a server's RSA public key
# and never imports an RSA private key at runtime. Surfaced as an
# unsatisfied-dependency Kconfig warning (fatal under
# samples/west-vanilla.yml's build, task #8) that hadn't been hit before --
# this GTS_Root_R4 chain is ECDSA (P-384), not RSA (see the cert-bundle
# comment below), so ECDHE-RSA support here is defensive breadth, never
# actually exercised by this sample's real handshake.
CONFIG_PSA_WANT_KEY_TYPE_RSA_KEY_PAIR_IMPORT=y

# Key exchange alone isn't a complete cipher suite -- TLS also needs a bulk
# symmetric cipher, and without one selected, ssl_msg.c's AEAD
# authenticated-encryption code paths become dead code and fail
# -Werror=unused-variable/-function the same way md.c did with no hash
# algorithm above. AES-GCM is the standard modern choice (matches what
# ECDHE-RSA/ECDHE-ECDSA-AES128-GCM-SHA256, one of the most common suites
# real HTTPS servers offer, actually needs).
CONFIG_PSA_WANT_ALG_GCM=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y

# TCP: same nRF91-heritage trap as the DNS block below -- the cellular
# samples never enable native TCP because the modem's offloaded sockets
# provide it. On the native stack SOCK_STREAM creation fails outright
# (surfaces as -107/ENOTCONN from TLS socket create -- found on real
# hardware 2026-07-20, after DNS was fixed and exposed the next layer).
CONFIG_NET_TCP=y

# DNS: unlike the nRF91 samples (https_init/coap_tcp_init), where sockets --
# including getaddrinfo() -- are offloaded to the modem and the modem does
# name resolution, ESP32-C6 runs Zephyr's native IP stack, which has NO
# resolver unless one is compiled in; without one every getaddrinfo() fails
# -2 (found on first real-hardware run, 2026-07-20). Static public resolvers
# rather than CONFIG_NET_DHCPV4_OPTION_DNS_ADDRESS, deliberately: with that
# option enabled, a dns_resolve_reconfigure() failure while parsing a DHCP
# offer's DNS option makes dhcpv4.c reject the WHOLE offer -- logged only at
# debug level -- so DHCP never completes and the board never gets an IP
# (observed on real hardware as a silent 30s connectivity timeout).
# MAX_NAME_LEN: the default (20) is shorter than our 52-char staging
# hostname -- resolution fails before any query is even sent.
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="1.1.1.1"
CONFIG_DNS_SERVER2="8.8.8.8"
CONFIG_DNS_RESOLVER_MAX_SERVERS=2
CONFIG_DNS_RESOLVER_MAX_NAME_LEN=64

# PEM parsing: the CA cert ships as PEM (cert/GTS_Root_R4.crt) and mbedTLS
# without PEM_PARSE_C only accepts DER -- provisioning fails -0x2180
# (X509 invalid format) at sec_tag load. Fourth nRF91-heritage gap found on
# real hardware 2026-07-20: the modem's offloaded TLS accepts PEM natively,
# so the cellular samples never needed this. PEM (not DER conversion) kept
# deliberately -- it's the format CAs hand out, friendlier for a sample.
CONFIG_MBEDTLS_PEM_PARSE_C=y

# The CA we provision (cert/GTS_Root_R4.crt) is an ECC P-384 root, and the
# workers.dev chain (GTS WE1 intermediate) verifies with SHA-384 -- the
# P-256/SHA-256-only menu above covers common leaf suites but can't even
# parse this root's public key (mbedTLS -0x2100 at provisioning, found on
# real hardware 2026-07-20 once PEM parsing was enabled and exposed the
# next layer).
CONFIG_PSA_WANT_ECC_SECP_R1_384=y
CONFIG_PSA_WANT_ALG_SHA_384=y

# TLS record buffers: the tree default (1500 in/out) cannot hold Cloudflare's
# TLS 1.2 certificate flight (leaf + GTS WE1 intermediate, >2KB in one
# record). 16KiB in = the TLS maximum, safe against any chain; 4KiB out is
# ample for this sample's plain HTTPS shadow/telemetry requests. NOTE: this
# was originally (2026-07-20, in ws_init before the split) misdiagnosed as
# the cause of the -0x7780 handshake failure below it (a
# record_size_limit interplay theory) -- root-caused via a native_sim
# harness making a real handshake against dovecote-staging with mbedTLS
# debug tracing (correctly wired this time, see below) that it was
# actually missing SNI. This bump is still needed and correct (the
# Certificate message really doesn't fit in 1500 bytes), just not why
# -0x7780 was happening -- keeping it since removing it would just trade
# one real failure for another once SNI is fixed.
#
# Single symmetric knob under vanilla Zephyr (task #8, samples/west-vanilla.yml):
# CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN/_OUT_CONTENT_LEN (separately-settable
# in/out sizes) is an nRF Connect SDK-only Kconfig extension --
# zephyr/modules/mbedtls/Kconfig.mbedtls upstream only exposes one
# CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN, applied to both directions
# (config-mbedtls.h #defines MBEDTLS_SSL_IN/OUT_CONTENT_LEN from the same
# value). Set to the larger (16KiB) of the two previous asymmetric values,
# since this Kconfig can't express "small out, large in" -- costs a little
# extra RAM on the outbound side versus the NCS build's tuned 4KiB, but is
# still safely within this sample's measured mbedTLS heap budget below.
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=16384

# net_conn slots: tree default (4) is left as-is here -- this sample only
# ever opens one transient HTTPS/TCP connection at a time (shadow.c's
# sequential connect/request/close pattern, no persistent socket alongside
# it), so the 2 persistent DNS-server conns + 1 transient HTTPS attempt fit
# comfortably. ws_init bumps this to 8 because it holds a persistent WS
# socket open concurrently with transient HTTPS attempts -- that pressure
# doesn't exist here, so this sample deliberately does NOT carry that
# override over.

# --- TLS handshake fatal-alert (-0x7780) root cause, 2026-07-20 ---
#
# Root-caused with a native_sim harness performing a REAL handshake against
# dovecote-staging (native_sim + NSOS real-networking offload, same
# TLS/PSA config as this file, correctly-wired mbedTLS debug tracing -- see
# below), not guesswork. Four independent, compounding gaps, found one at a
# time as each got fixed and exposed the next (originally found via
# ws_init/wifi_init before the sample split; this sample needs the same
# fixes since it uses the identical TLS/PSA stack, just without WS):
#
# 1. No SNI (server_name ClientHello extension) was ever sent.
#    mbedtls_ssl_set_hostname() (what Zephyr's TLS_HOSTNAME sockopt calls)
#    needs this Kconfig to actually emit the extension --
#    zephyr/modules/mbedtls/configs/config-mbedtls.h only #defines
#    MBEDTLS_SSL_SERVER_NAME_INDICATION when it's set, and it never was.
#    Cloudflare's edge can't route a TLS connection to the right
#    zone/worker without SNI on a shared IP and responds with a fatal
#    handshake_failure alert (level 2, description 40) immediately after
#    ClientHello, before ever sending ServerHello -- this IS the -0x7780
#    the harness reproduced byte-for-byte, and is the actual cause (not
#    the record-size theory the CONTENT_LEN bump above was originally
#    written for).
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
#
# 2. Once SNI was fixed and a real ServerHello/Certificate flight started
#    arriving, mbedTLS's own allocator had no memory: config-tf-psa-crypto.h
#    unconditionally compiles in MBEDTLS_MEMORY_BUFFER_ALLOC_C, which
#    (confirmed empirically -- bumping the unrelated general
#    CONFIG_HEAP_MEM_POOL_SIZE above did nothing) hard-redirects
#    mbedtls_calloc()/free() to its own dedicated static buffer rather than
#    Zephyr's general heap -- but that buffer is only ever handed to the
#    allocator (zephyr/modules/mbedtls/zephyr_init.c:26-43,
#    mbedtls_memory_buffer_alloc_init()) if CONFIG_MBEDTLS_ENABLE_HEAP is
#    set, which it never was. Every allocation mbedTLS made (starting with
#    the ~16KiB CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN buffer above) failed
#    outright.
CONFIG_MBEDTLS_ENABLE_HEAP=y
#
# Sized off ws_init's own measured numbers rather than a fresh guess: that
# sample's native_sim harness (mbedtls_memory_buffer_alloc_max_get(), see
# its prj.conf's "Memory sizing" note) measured "HTTPS alone (transient,
# freed after each request)" peaking at ~31.5KiB (32280 bytes) -- this
# sample's exact workload, since it never opens a concurrent WS context.
# 65536 (64KiB) is ~2x that measured peak, matching the margin ratio
# ws_init used for its own (larger, concurrent-HTTPS+WS) number. Caveat:
# this specific value has NOT been independently re-run through the
# harness for a WS-free build -- it's a reasoned reuse of ws_init's
# measured sub-case, not a fresh measurement of this exact sample, and this
# sample remains build-verified only (no ESP32-C6 hardware attached, see
# README).
CONFIG_MBEDTLS_HEAP_SIZE=65536
#
# 3. Once past cert verification (which succeeded fine -- P-384 root, P-256
#    leaf, all already-wanted), ECDHE key exchange failed silently
#    (MBEDTLS_ERR_SSL_HW_ACCEL_FAILED, no debug message pinpointing why --
#    modules/crypto/mbedtls/library/ssl_tls12_client.c:2408's
#    psa_generate_key() just returns it on any PSA failure). ECDHE needs a
#    FRESH ephemeral EC key pair generated per handshake (forward secrecy)
#    -- CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT above only covers
#    importing/holding an *existing* key, a distinct PSA capability from
#    generating a new one.
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
#
# 4. Once ECDHE succeeded, master-secret derivation failed the same
#    silent way (ssl_tls.c:6438-6443's handshake->tls_prf() call ->
#    MBEDTLS_ERR_SSL_HW_ACCEL_FAILED). TLS 1.2's PRF is its own distinct
#    PSA algorithm in this architecture, PSA_ALG_TLS12_PRF(hash) -- neither
#    the raw hash alg (already wanted above) nor a generic want covers it.
CONFIG_PSA_WANT_ALG_TLS12_PRF=y
CONFIG_PSA_WANT_ALG_HMAC=y
CONFIG_PSA_WANT_KEY_TYPE_HMAC=y
#
# With all four applied, the harness completed a full handshake against
# the real dovecote-staging endpoint (mbedTLS logged the plaintext
# application data exchange starting, then a clean close_notify).
#
# Debug-hookup sub-finding (why CONFIG_MBEDTLS_DEBUG=y + _DEBUG_LEVEL=2 +
# NET_SOCKETS_LOG_LEVEL_DBG produced zero <dbg> output during the original
# diagnosis attempt): CONFIG_MBEDTLS_DEBUG_LEVEL
# (zephyr/modules/mbedtls/Kconfig:102-109) has no independent `prompt` --
# it's a plain `default N if MBEDTLS_LOG_LEVEL_X` derived int, so a direct
# `=2` assignment in a .conf fragment has no defined symbol to attach to
# and is silently dropped by the Kconfig merge (confirmed: it stayed at
# its computed default, 0, in the actual .config despite that line).
# mbedtls_debug_set_threshold() (zephyr_init.c:50-51) is seeded from that
# same always-0 value, so mbedTLS's *own* internal debug filter suppressed
# virtually everything before it ever reached the Zephyr log level gate --
# CONFIG_NET_SOCKETS_LOG_LEVEL_DBG only ever controlled sockets_tls.c's
# own separate "net_sock_tls" log module, not mbedTLS's internal trace
# (its own separate "mbedtls" log module, zephyr/modules/mbedtls/debug.c:9,
# gated by CONFIG_MBEDTLS_LOG_LEVEL -- a third, also-distinct symbol).
# Selecting the underlying `MBEDTLS_LOG_LEVEL_DBG` choice option instead
# (as this harness's debug prj.conf did) correctly propagates to both
# CONFIG_MBEDTLS_DEBUG_LEVEL and CONFIG_MBEDTLS_LOG_LEVEL at once, since
# both derive their default from the same choice selection. Not applying
# that choice here -- this was a one-time diagnosis tool, not something
# this sample needs enabled by default.
#
# No CONFIG_PSA_WANT_ALG_SHA_1 here: that want exists only for
# websocket_connect()'s RFC 6455 Sec-WebSocket-Key/Accept handshake, which
# this WS-free sample never performs -- see ws_init's prj.conf for that
# finding. Likewise no WS-context-leak or concurrent-memory-sizing notes
# here (both ws_init-specific); see that sample's prj.conf for the full
# writeup if this sample ever needs a persistent socket again.
