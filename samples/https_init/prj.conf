# Pigeon client library: fetches the device shadow over HTTPS (pigeon_https.c).
# CONFIG_PIGEON_ENDPOINT/TOKEN are set further down.
CONFIG_PIGEON=y
CONFIG_PIGEON_CONNECTOR_HTTPS=y

# Opt-in low-data remote logging (Zephyr dictionary-based, see pigeon's
# zephyr/Kconfig): a background backend batches this device's own log
# output and ships it to <CONFIG_PIGEON_ENDPOINT>/logs. Off by default at
# the library level -- turned on here so this reference sample exercises
# it end-to-end. Decoding uploaded chunks needs this build's own
# build/https_init/zephyr/log_dictionary.json; see pigeon-examples' README.
CONFIG_PIGEON_LOG_UPLOAD=y

# NCS boot banner
CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="Pigeon"

# Set LIBC
CONFIG_PICOLIBC=y

# PicolibC targets C17 and POSIX 2018 standards
CONFIG_STD_C17=y

# Enforce MISRA C standards
CONFIG_MISRA_SANE=y

# Enable FPU & FPU sharing
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Reset Reason and Reboot
CONFIG_HWINFO=y
CONFIG_REBOOT=y

# Power Management
CONFIG_PM_DEVICE=y

# Compiler optimizations
# Optimize for speed since space isn't a huge concern for this app
# CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_DEBUG_OPTIMIZATIONS=y

# Flash operations.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_STREAM_FLASH=y
CONFIG_SETTINGS=y

# TLS credential storage, used by connection_manager.c to provision the CA cert
CONFIG_TLS_CREDENTIALS=y

# MCUBOOT
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_BOOTUTIL_LIB=y

# MCUmgr: image management (DFU) over serial, matching the "Load image via
# bootloader" .vscode task (newtmgr -c serial) on uart0/ttyUSB0.
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y
CONFIG_UART_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y

# MCUmgr command groups
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y

# Image management / DFU
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_IMG_ENABLE_IMAGE_CHECK=y

# Stack and heap configurations
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Generic networking options
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=y

# Net connection manager
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=1024

# Default (768-800B) overflowed running our connection_manager.c's net_mgmt
# event callback (cert provisioning via tls_credential_add, mbedTLS, logging)
# on this thread's stack. nrf/samples/cellular/*_fota use 2048 for similarly
# TLS/logging-heavy callback chains.
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y

# Lets shadow.c's "log" field actually toggle logging at runtime (not just
# print a line about it) via log_filter_set().
CONFIG_LOG_RUNTIME_FILTERING=y

# Network Logging
CONFIG_NET_LOG=y
CONFIG_NET_SOCKETS_LOG_LEVEL_DBG=y

# Debugging
CONFIG_DEBUG=y
CONFIG_FAULT_DUMP=2

# CONFIG_PIGEON_ENDPOINT/CONFIG_PIGEON_TOKEN are real device secrets, so they
# live in the git-ignored prj.local.conf instead (auto-merged by
# CMakeLists.txt if present). See connection_manager.h's JES_SEC_TAG=1, which
# CONFIG_PIGEON_HTTPS_SEC_TAG defaults to matching, for the CA cert this
# connects with.
