# Allow writing to the (internal) flash at runtime, needed for MCUmgr image
# management to write firmware updates into slot1.
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# Align the max FD entry to NRF_MODEM_MAX_SOCKET_COUNT(8)
CONFIG_ZVFS_OPEN_MAX=8
CONFIG_NET_SOCKETS_POLL_MAX=8

# Disable Duplicate Address Detection (DAD)
# due to not being properly implemented for offloaded interfaces.
CONFIG_NET_IPV6_NBR_CACHE=n
CONFIG_NET_IPV6_MLD=n

# Connection Manager and Connectivity layer
CONFIG_NRF_MODEM_LIB_NET_IF=y

# AT Host
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_AT_HOST_LIBRARY=y

# Modem key management
# Must be y: nRF91 TLS sockets are offloaded to the modem, which does its own
# TLS handshake using certs provisioned to ITS OWN credential store via AT
# commands (modem_key_mgmt), not Zephyr's tls_credentials/mbedTLS subsystem.
# With this =n, connection_manager.c's provision_cert() fell through to
# tls_credential_add(), which the offloaded socket implementation never
# consults -- so the modem had no CA cert at the sec_tag and any outbound TLS
# connection (e.g. the pigeon HTTPS shadow fetch) would fail the handshake.
CONFIG_MODEM_KEY_MGMT=y

# TF-M configurations
# TF-M's secure image size/RAM (slot0_s_partition, sram0_s) is now set via the
# board devicetree overlay instead of Partition Manager Kconfig.
CONFIG_BUILD_WITH_TFM=y
CONFIG_TFM_PROFILE_TYPE_NOT_SET=y
CONFIG_TFM_CMAKE_BUILD_TYPE_RELEASE=y

# UART configuration (common)
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y

# UART configuration (nRF91 specific)
CONFIG_UART_1_ASYNC=y
CONFIG_UART_1_INTERRUPT_DRIVEN=n

# Modem trace uart backend
# NRF_MODEM_LIB_TRACE_BACKEND_UART lives under "if NRF_MODEM_LIB_TRACE", so the
# trace subsystem itself must be enabled or the backend choice never applies.
CONFIG_NRF_MODEM_LIB_TRACE=y
CONFIG_NRF_MODEM_LIB_TRACE_BACKEND_UART=y
