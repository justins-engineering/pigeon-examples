# Pigeon client library: fetches/reports the device shadow over HTTPS
# (pigeon_https.c), same connector as https_init. CONFIG_PIGEON_ENDPOINT/
# TOKEN are real device secrets, so they live in the git-ignored
# prj.local.conf instead (auto-merged by CMakeLists.txt if present).
CONFIG_PIGEON=y
CONFIG_PIGEON_CONNECTOR_HTTPS=y

# Task #45's wedge-recovery mitigations (see ~/pigeon/CLAUDE.md and
# zephyr/Kconfig for the full diagnosis/writeup): a field asset tracker is
# the poster child for needing unattended recovery from a wedge -- there is
# no operator console out at the asset's actual location. REBOOT_ON_FATAL
# overrides Zephyr's default "halt forever" policy for a real fatal
# error/assert with an immediate self-reboot; WATCHDOG covers the
# complementary case of a silent liveness stall with no fatal error at all,
# fed by every successful pigeon_shadow_flush() telemetry report. Neither
# needs any application code beyond this Kconfig -- both are wired up
# entirely inside the pigeon library.
CONFIG_PIGEON_REBOOT_ON_FATAL=y
CONFIG_PIGEON_WATCHDOG=y

# NCS boot banner
CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="Pigeon Asset Tracker"

# Set LIBC
CONFIG_PICOLIBC=y
CONFIG_PICOLIBC_IO_FLOAT=y

# PicolibC targets C17 and POSIX 2018 standards
CONFIG_STD_C17=y

# Enforce MISRA C standards
CONFIG_MISRA_SANE=y

# Enable FPU & FPU sharing -- gnss.c does floating-point lat/lon/speed math
# (both real PVT data and the simulated-track circle math).
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# %f formatting for snprintk()'d telemetry values (shadow.c formats
# gps_lat/gps_lon/etc as decimal strings) -- defaults to y with FPU on, but
# made explicit rather than relied on, since a %f silently printing "FP?"
# instead of the intended value is easy to miss in an indoor demo where
# nothing else calls attention to it.
CONFIG_CBPRINTF_FP_SUPPORT=y

# Reset Reason and Reboot (shadow.c's "reboot" shadow command, and
# CONFIG_PIGEON_REBOOT_ON_FATAL above, both use sys_reboot())
CONFIG_HWINFO=y
CONFIG_REBOOT=y

# Power Management
CONFIG_PM_DEVICE=y

# No MCUboot/sysbuild here (unlike https_init) -- this sample doesn't do
# FOTA, so it builds as a single plain image, not a dual-slot MCUboot one.
# Still needed the same slot0 secure/nonsecure rebalance https_init's board
# overlay does (see boards/circuitdojo_feather_nrf9151_ns.overlay) -- the
# stock 192 KB nonsecure split isn't enough for
# HTTPS+TLS+cellular+GNSS+logging, confirmed by an actual failing link
# before adding that overlay. Optimize for size regardless, same rationale
# coap_tcp_init's prj.conf documents.
CONFIG_SIZE_OPTIMIZATIONS=y

# Flash operations (device settings are not used here, but HWINFO/REBOOT
# above pull in CONFIG_FLASH transitively on some boards; kept explicit).
CONFIG_FLASH=y

# TLS credential storage, used by connection_manager.c to provision the CA
# cert (via modem_key_mgmt on nRF91 offloaded sockets -- see the board .conf).
CONFIG_TLS_CREDENTIALS=y

# Stack and heap configurations
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Generic networking options
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=y

# Net connection manager
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=1024

# Without this, conn_mgr_all_if_down() (called by connection_manager.c's
# lte_disconnect(), before its own explicit lte_lc_power_off()) tears the
# modem library itself down instead of just deactivating LTE, leaving
# lte_lc_power_off()'s subsequent CFUN=0 with no AT channel to succeed on
# (task #6, root-caused and hardware-verified against https_init -- see
# that sample's prj.conf for the full writeup; this sample shares the same
# connection_manager.c pattern).
CONFIG_NRF_MODEM_LIB_NET_IF_DOWN_DEFAULT_LTE_DISCONNECT=y

# LTE + GNSS coexistence: the nRF91 modem shares one radio between LTE and
# GNSS. LTE_M_GPS puts GPS in the modem's own system mode bitmask, which is
# what lets it interleave GNSS search/tracking windows with LTE reception
# automatically -- no manual CFUN toggling or connect/disconnect dance
# needed from application code, unlike a modem that can only do one or the
# other. This is the same mechanism (and the same underlying modem
# scheduler) nRF's own "Cellular: GNSS" sample relies on. LTE-M-only (not
# NB-IoT) since that's what this Feather's SIM/coverage is provisioned for
# in this workspace's other cellular samples.
CONFIG_LTE_NETWORK_MODE_LTE_M_GPS=y

# Power Saving Mode (PSM): requests the network grant this device longer,
# more frequent idle windows, which GNSS's automatic scheduling can then
# use for satellite search without waiting on LTE's own paging cadence.
# Same requested PSM parameters nRF's own GNSS sample uses (8h periodic
# TAU / 6s active time) -- a reasoned starting point, not independently
# tuned for this specific asset-tracking cadence.
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PSM_REQ_RPTAU="00101000"
CONFIG_LTE_PSM_REQ_RAT="00000011"

# AT Host library -- lets AT commands be sent directly from a UART terminal
# and integrates with nRF Connect for Desktop's LTE Link Monitor, same as
# https_init/coap_tcp_init.
CONFIG_AT_HOST_LIBRARY=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y

# Lets shadow.c's "log" field actually toggle logging at runtime (not just
# print a line about it) via log_filter_set().
CONFIG_LOG_RUNTIME_FILTERING=y

# Network Logging
CONFIG_NET_LOG=y

# Debugging
CONFIG_DEBUG=y
CONFIG_FAULT_DUMP=2

# CONFIG_PIGEON_ENDPOINT/CONFIG_PIGEON_TOKEN are real device secrets, so they
# live in the git-ignored prj.local.conf instead (auto-merged by
# CMakeLists.txt if present). See connection_manager.h's JES_SEC_TAG=1, which
# CONFIG_PIGEON_HTTPS_SEC_TAG defaults to matching, for the CA cert this
# connects with.
